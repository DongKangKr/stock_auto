name: Daily KPRI Dashboard Update

on:
  schedule:
    # 매 평일 KST 17:00 (UTC 08:00) - 한국 증시 마감(15:30) 후
    - cron: '0 8 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore data cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            history_cache.pkl
            dividend_cache.pkl
            db_config.json
          key: kpri-data-${{ github.run_id }}
          restore-keys: |
            kpri-data-

      - name: Run dashboard update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python main.py

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            history_cache.pkl
            dividend_cache.pkl
            db_config.json
          key: kpri-data-${{ github.run_id }}

      - name: Upload update log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-log-${{ github.run_number }}
          path: update.log
          retention-days: 14
